<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="stylesheet" href="style.css"> <!-- Link para o arquivo CSS que contém os estilos da página -->
    <meta charset="UTF-8"> <!--Define a codificação de caracteres como UTF-8-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Define a viewport para garantir que o site
    seja responsivo em dispositivos móveis-->
    <link rel="icon" href="favicon.ico"> <!-- Define o ícone da página (favicon) -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png"> <!-- Define o ícone da página (favicon) para dispositivos que suportam PNG -->
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png"> <!-- Define o ícone da página (favicon) para dispositivos que suportam PNG -->
    <title>GengarDex</title>
</head>

<body>
    <header> <!-- Define o cabeçalho da página -->
        <h1>GengarDex</h1>
        <p>Welcome to the ultimate Pokémon encyclopedia!</p>
    </header>
    <section> <!-- Define uma seção para a busca de Pokémon -->
        <input type="text" id="campo-pokemon" placeholder="Enter the Pokémon name">
        <button id="botao-buscar">Search</button>
    </section>
    <div id="info-pokemon"> <!-- Div para exibir as informações do Pokémon --></div>
    <div id="lista-favoritos"> <!-- Div para exibir a lista de favoritos --></div>
    <script src="dadosJogos.js"></script> <!-- Link para o arquivo JavaScript que contém os dados dos jogos -->
    <script src="app.js"></script> <!-- Link para o arquivo JavaScript que contém a lógica da aplicação -->

    <h2>Games</h2>
    <div id="area-jogos"></div> <!-- Div para exibir os jogos -->
    <button id="btn-jogos" onclick="mostrarJogos()">Show Games</button> <!-- Botão para mostrar os jogos -->
</body>

</html>
