<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8"> <!--Define a codificação de caracteres como UTF-8-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Define a viewport para garantir que o site
    seja responsivo em dispositivos móveis-->
    <title>GengarDex</title>
</head>

<body>
    <header> <!-- Define o cabeçalho da página -->
        <h1>GengarDex</h1>
        <p>Boas-vindas ao GengarDex, a enciclopédia definitiva para os fãs de Pokémon!</p>
    </header>
    <section> <!-- Define uma seção para a busca de Pokémon -->
        <input type="text" id="campo-pokemon" placeholder="Digite o nome do Pokémon">
        <button id="botao-buscar">Buscar</button>
    </section>
    <div id="info-pokemon"> <!-- Div para exibir as informações do Pokémon --></div>
    <div id="lista-favoritos"> <!-- Div para exibir a lista de favoritos --></div>
    <script src="app.js"></script> <!-- Link para o arquivo JavaScript que contém a lógica da aplicação -->
</body>

</html>
